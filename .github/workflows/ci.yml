name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Lint backend
        run: npm run lint
        working-directory: backend
      - name: Test backend
        run: npm run test
        working-directory: backend
      - name: Build backend
        run: npm run build
        working-directory: backend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build ./backend
      - name: Build frontend Docker image
        run: docker build --build-arg VITE_API_URL=http://localhost:3000 ./frontend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
      - name: Test frontend
        run: npm run test -- --run
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile
      - name: Typecheck mobile
        run: npx tsc --noEmit
        working-directory: mobile

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: trackvibe
          POSTGRES_PASSWORD: trackvibe_test_password
          POSTGRES_DB: trackvibe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trackvibe -d trackvibe_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Run migrations
        run: npm run migrate:up
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://trackvibe:trackvibe_test_password@localhost:5432/trackvibe_test
          DB_SSL: 'false'

  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        project: [backend, frontend, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.project }}
      - name: Audit dependencies
        run: npm audit --audit-level=critical
        working-directory: ${{ matrix.project }}
